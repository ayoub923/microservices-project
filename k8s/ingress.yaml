apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  rules:
    - host: app.local
      http:
        paths:
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80

          - path: /products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 80

          - path: /products-from-user
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80

          - path: /db
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80
